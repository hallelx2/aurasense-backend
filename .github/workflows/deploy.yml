name: Deploy to Digital Ocean

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Allow manual triggering

jobs:
  test:
    runs-on: ubuntu-latest
    name: Phase-0 import & settings smoke

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync deps (incl. dev group)
        run: uv sync --group dev

      - name: Run pytest smoke suite
        env:
          # Force dev mode so production safety asserts don't fire.
          ENVIRONMENT: development
          SECRET_KEY: ci-test-secret
          GROQ_API_KEY: ci-test-groq-key
          NEO4J_PASSWORD: ci-test-neo4j
        run: uv run pytest -q

  deploy:
    runs-on: ubuntu-latest
    needs: test  # Refuse to deploy if smoke fails.

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "
            # Navigate to project directory
            cd /var/www/aurasense-backend

            # Backup current deployment
            cp -r . ../aurasense-backend_backup_\$(date +%Y%m%d_%H%M%S) || true

            # Pull latest changes
            git fetch origin
            git reset --hard origin/main

            # Stop services
            docker compose down || true

            # Build and start
            docker compose pull
            docker compose build --no-cache
            docker compose up -d

            # Wait for services
            sleep 30

            # Health check
            curl -f http://localhost:8000/health || exit 1

            echo 'Deployment successful!'
          "

      - name: Notify deployment status
        if: always()
        run: |
          if [ ${{ job.status }} == 'success' ]; then
            echo "✅ Deployment successful!"
          else
            echo "❌ Deployment failed!"
          fi
