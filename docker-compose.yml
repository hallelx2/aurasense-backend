services:
  neo4j:
    image: neo4j:5.22.0
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-test1234}
      - NEO4J_PLUGINS=["graph-data-science"]
      - NEO4J_dbms_security_procedures_unrestricted=gds.*
      - NEO4J_dbms_security_procedures_allowlist=gds.*
      - NEO4J_server_memory_pagecache_size=512M
      - NEO4J_server_memory_heap_initial__size=512M
      - NEO4J_server_memory_heap_max__size=512M
      - NEO4J_dbms_connector_bolt_advertised__address=:7687
      - NEO4J_dbms_connector_http_advertised__address=:7474
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - aurasense-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-O", "/dev/null", "-q", "http://localhost:7474"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  redis:
    # Redis Stack ships RedisSearch + RedisJSON, both of which are required
    # by the LangGraph Redis checkpointer (`langgraph-checkpoint-redis` →
    # `redisvl`). The basic `redis:7-alpine` image will fail at
    # `AsyncRedisSaver.asetup()` because it can't create FT.* indexes.
    image: redis/redis-stack-server:7.4.0-v0
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - aurasense-network
    restart: unless-stopped
    environment:
      # Persist to disk for dev (otherwise the JWT blacklist + LangGraph
      # checkpoints don't survive container restarts).
      - REDIS_ARGS=--appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # The standalone `zepai/graphiti` container was removed in Phase 2.
  # Graphiti now runs in-process inside the FastAPI backend via the
  # `graphiti-core` Python SDK (see src/app/services/graphiti/client.py).
  # Configuration of the LLM + embedder is done via env vars
  # GRAPHITI_LLM_PROVIDER / GRAPHITI_LLM_MODEL /
  # GRAPHITI_EMBEDDER_PROVIDER / GRAPHITI_EMBEDDER_MODEL.

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aurasense-backend
    # Bind to loopback only: Nginx is the public path on the prod server
    # (see scripts/server-setup.sh). Use BACKEND_BIND=0.0.0.0 to expose
    # directly during local LAN testing.
    ports:
      - "${BACKEND_BIND:-127.0.0.1}:${PORT:-8000}:8000"
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      - NEO4J_HOST=neo4j
      - NEO4J_URI=bolt://neo4j:7687
      - REDIS_URL=redis://redis:6379
      - HOST=0.0.0.0
    networks:
      - aurasense-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  neo4j_data:
  neo4j_logs:
  redis_data:

networks:
  aurasense-network:
    driver: bridge
